<!-- CSV parser -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Hidden file picker -->
<input id="csvFiles" type="file" accept=".csv" multiple style="display:none" />

<!-- Filters -->
<div class="row mb-4">
  <div class="col-md-3">
    <label>Months to load (select multiple)</label>
    <select id="months" multiple class="form-control" size="12"></select>
  </div>
  <div class="col-md-3">
    <label>Origin Country</label>
    <input id="country" class="form-control" placeholder="e.g. Türkiye, Turkey, China">
  </div>
  <div class="col-md-3">
    <label>Hazard / Reason contains</label>
    <input id="hazard" class="form-control" placeholder="e.g. aflatoxin, salmonella, pesticide">
  </div>
  <div class="col-md-3">
    <label>Product / Commodity</label>
    <input id="product" class="form-control" placeholder="e.g. figs, pistachios, sesame">
  </div>
</div>

<button id="loadBtn" class="btn btn-primary btn-lg mb-3">🔄 Load selected months & Search</button>

<div id="results" class="mt-3"></div>
<table id="table" class="table table-striped table-hover mt-3" style="display:none"></table>

<script>
  const csvInput = document.getElementById('csvFiles');
  const monthsEl = document.getElementById('months');
  const countryEl = document.getElementById('country');
  const hazardEl = document.getElementById('hazard');
  const productEl = document.getElementById('product');
  const resultsEl = document.getElementById('results');
  const tableEl = document.getElementById('table');
  const loadBtn = document.getElementById('loadBtn');

  // In-memory cache for the loaded CSVs
  // { "2024-01": [{...row}, {...row}], "2024-02": [...] }
  const monthData = new Map();
  let csvsLoaded = false;

  function inferMonthLabel(filename) {
    // Use filename without extension as month label
    return filename.replace(/\.[^.]+$/, '');
  }

  function normalize(v) {
    return (v ?? '').toString().trim().toLowerCase();
  }

  function selectedMonths() {
    return Array.from(monthsEl.selectedOptions).map(o => o.value);
  }

  function allLoadedMonths() {
    return Array.from(monthData.keys());
  }

  function populateMonthDropdown(monthNames) {
    monthsEl.innerHTML = '';
    monthNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      monthsEl.appendChild(opt);
    });
  }

  function pickCsvFilesOnce() {
    return new Promise((resolve) => {
      csvInput.value = ''; // allow re-picking if needed
      csvInput.onchange = () => resolve(Array.from(csvInput.files || []));
      csvInput.click();
    });
  }

  function parseCsvFile(file) {
    return new Promise((resolve, reject) => {
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        dynamicTyping: false,
        complete: (results) => {
          if (results.errors && results.errors.length) {
            reject(new Error(`Error in ${file.name}: ${results.errors[0].message}`));
            return;
          }
          resolve({
            month: inferMonthLabel(file.name),
            rows: results.data || []
          });
        },
        error: (err) => reject(err)
      });
    });
  }

  async function ensureCsvsLoaded() {
    if (csvsLoaded) return;

    resultsEl.innerHTML = '<div class="alert alert-info">Choose your CSV files once...</div>';

    const files = await pickCsvFilesOnce();
    if (!files.length) {
      resultsEl.innerHTML = '<div class="alert alert-warning">No CSV files selected.</div>';
      return;
    }

    monthData.clear();

    try {
      const parsed = await Promise.all(files.map(parseCsvFile));
      parsed.forEach(({ month, rows }) => {
        monthData.set(month, rows);
      });

      populateMonthDropdown(Array.from(monthData.keys()));
      csvsLoaded = true;

      resultsEl.innerHTML = `<div class="alert alert-success">Loaded ${monthData.size} CSV file(s).</div>`;
    } catch (err) {
      csvsLoaded = false;
      resultsEl.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      throw err;
    }
  }

  function rowMatches(row, qCountry, qHazard, qProduct) {
    const values = Object.values(row).map(normalize);
    const rowText = values.join(' | ');

    return (!qCountry || rowText.includes(qCountry)) &&
           (!qHazard  || rowText.includes(qHazard)) &&
           (!qProduct || rowText.includes(qProduct));
  }

  function renderTable(rows) {
    if (!rows.length) {
      tableEl.style.display = 'none';
      tableEl.innerHTML = '';
      return;
    }

    // Collect all keys across rows so columns are not lost
    const headers = Array.from(
      rows.reduce((set, row) => {
        Object.keys(row).forEach(k => set.add(k));
        return set;
      }, new Set())
    );

    let html = '<thead><tr>';
    headers.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';

    rows.forEach(row => {
      html += '<tr>';
      headers.forEach(h => {
        const val = row[h] ?? '';
        html += `<td>${String(val)}</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody>';

    tableEl.innerHTML = html;
    tableEl.style.display = '';
  }

  async function loadAndSearch() {
    await ensureCsvsLoaded();
    if (!csvsLoaded) return;

    const qCountry = normalize(countryEl.value);
    const qHazard = normalize(hazardEl.value);
    const qProduct = normalize(productEl.value);

    const monthsToSearch = selectedMonths().length ? selectedMonths() : allLoadedMonths();

    let allRows = [];
    monthsToSearch.forEach(month => {
      const rows = monthData.get(month) || [];
      allRows = allRows.concat(rows.map(r => ({ ...r, __month: month })));
    });

    const filtered = allRows.filter(row => rowMatches(row, qCountry, qHazard, qProduct));

    resultsEl.innerHTML = `
      <div class="alert alert-secondary">
        Showing <strong>${filtered.length}</strong> matching row(s)
        from <strong>${monthsToSearch.length}</strong> month(s).
      </div>
    `;

    renderTable(filtered);
  }

  loadBtn.addEventListener('click', loadAndSearch);
</script>
